<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a56"/>
      <stop offset="50%" stop-color="#e85a1e"/>
      <stop offset="100%" stop-color="#8a2c00"/>
    </linearGradient>
    <!-- Subtle top-light gloss for iOS 26 depth -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Pot body gradient for 3D roundness -->
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0dbd6"/>
    </linearGradient>
    <!-- Pot rim highlight -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ebe6e1"/>
    </linearGradient>
    <!-- Steam wisp gradient for depth -->
    <linearGradient id="steam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#f5ebe5" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="steamSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0e4db" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Handle gradient -->
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ddd8d3"/>
    </linearGradient>
    <!-- Soft inner shadow for pot -->
    <filter id="potShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#6b2000" flood-opacity="0.2"/>
    </filter>
    <filter id="rimShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#6b2000" flood-opacity="0.15"/>
    </filter>
    <filter id="steamGlow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#6b2000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <!-- Rounded background with richer gradient -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Gloss overlay for 3D depth -->
  <rect width="128" height="128" rx="28" fill="url(#gloss)"/>
  <!-- Pot handles with shadow and gradient -->
  <rect x="18" y="80" width="16" height="7" rx="3.5" fill="url(#handle)" filter="url(#potShadow)"/>
  <rect x="94" y="80" width="16" height="7" rx="3.5" fill="url(#handle)" filter="url(#potShadow)"/>
  <!-- Pot rim with highlight -->
  <rect x="28" y="76" width="72" height="8" rx="4" fill="url(#rim)" filter="url(#rimShadow)"/>
  <!-- Pot body with gradient and shadow -->
  <path d="M32 84h64v16c0 6.6-5.4 12-12 12H44c-6.6 0-12-5.4-12-12V84z" fill="url(#pot)" filter="url(#potShadow)"/>
  <!-- Subtle specular highlight on pot body -->
  <path d="M34 84h60v3c0 0-15 3-30 3s-30-3-30-3V84z" fill="#fff" opacity="0.3"/>
  <!-- Center steam wisp with glow -->
  <path d="M64 14c-4 6-10 14-10 22 0 5 3 8 3 14s-4 10-4 15c0 7 5 11 11 11s11-4 11-11c0-5-4-9-4-15s3-9 3-14c0-8-6-16-10-22z" fill="url(#steam)" filter="url(#steamGlow)"/>
  <!-- Left steam wisp -->
  <path d="M45 34c-2.5 4-6 9-6 14 0 3 2 6 2 10s-2.5 7-2.5 10c0 4.5 3 7 6.5 7s6.5-2.5 6.5-7c0-3-2.5-6-2.5-10s2-7 2-10c0-5-3.5-10-6-14z" fill="url(#steamSide)" filter="url(#steamGlow)"/>
  <!-- Right steam wisp -->
  <path d="M83 34c-2.5 4-6 9-6 14 0 3 2 6 2 10s-2.5 7-2.5 10c0 4.5 3 7 6.5 7s6.5-2.5 6.5-7c0-3-2.5-6-2.5-10s2-7 2-10c0-5-3.5-10-6-14z" fill="url(#steamSide)" filter="url(#steamGlow)"/>
</svg>
