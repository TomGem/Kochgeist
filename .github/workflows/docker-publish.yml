name: Publish Docker Image

# WHEN does this run?
on:
  release:
    types: [published]

# WHAT permissions does the workflow get?
permissions:
  contents: read
  packages: write

# WHAT does it do?
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo code
      - name: Checkout
        uses: actions/checkout@v6

      # 2. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Extract version tag from the release (e.g. "v0.9.1" -> "0.9.1")
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 4. Lowercase the owner name (container registries require lowercase)
      - name: Lowercase owner
        id: owner
        run: echo "name=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      # 5. Build and push the Docker image with version + latest tags
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/kochgeist:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.name }}/kochgeist:latest
